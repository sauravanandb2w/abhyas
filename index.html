<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#faf7ed" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Adarsh" />
<title>Adarsh · आदर्श</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf7ed; --bg-2: #f5f0e2; --card: #ffffff; --card-2: #fbf7eb;
    --line: #ebe4d2; --line-soft: #f0e9d8;
    --text: #1f1c14; --muted: #6e6760; --muted-2: #9a9389;
    --accent: #b86848; --accent-2: #cc785c;
    --good: #6f8a5e; --bad: #b54f48; --saffron: #d97757;
    --gs1: #c97d5a; --gs2: #7d8f6f; --gs3: #6b8194; --gs4: #a87b95;
    --essay: #8a8265; --opt: #b89149;
    --serif: "Source Serif 4", ui-serif, Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --r-md: 10px; --r-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg); font-family: var(--sans); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 16px 18px calc(80px + env(safe-area-inset-bottom, 12px)); }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .brand-name { font-family: var(--serif); font-size: 26px; font-weight: 400; letter-spacing: -0.03em; line-height: 1; }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-variant: small-caps; letter-spacing: 0.08em; }
  .icon-row { display: flex; gap: 5px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 9px; background: var(--card);
    border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted); cursor: pointer; font-family: var(--sans);
  }

  /* Search */
  .search {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 16px; margin: 16px 0 22px; display: flex; align-items: center; gap: 10px;
    color: var(--muted);
  }
  .search input {
    flex: 1; background: transparent; border: 0; outline: 0; color: var(--text);
    font-family: inherit; font-size: 14px;
  }
  .search input::placeholder { color: var(--muted); }

  /* Section label */
  .sec-label {
    font-size: 11px; color: var(--muted); letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600; margin: 22px 2px 12px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sec-label .more { text-transform: none; letter-spacing: 0; font-size: 12px; color: var(--accent-2); font-weight: 500; cursor: pointer; }
  .sec-label:first-of-type { margin-top: 0; }

  /* Paper grid */
  .papers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .paper-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 16px 14px; cursor: pointer; transition: background 0.12s;
  }
  .paper-card:hover { background: var(--card-2); }
  .paper-card .stripe { width: 30px; height: 3px; border-radius: 2px; margin-bottom: 10px; }
  .paper-card .pname { font-family: var(--serif); font-size: 17px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.15; margin-bottom: 4px; }
  .paper-card .pdesc { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
  .paper-card .pstats { display: flex; gap: 10px; font-size: 10.5px; color: var(--muted-2); letter-spacing: 0.02em; }
  .paper-card .pstats b { color: var(--text); font-family: var(--serif); font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.015em; }

  /* Recent */
  .recent-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; display: flex; gap: 12px; align-items: center;
    margin-bottom: 8px; cursor: pointer;
  }
  .recent-thumb {
    width: 50px; height: 50px; background: var(--card-2); border-radius: 8px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 13px; color: var(--muted);
  }
  .recent-meta { flex: 1; min-width: 0; }
  .recent-q {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em; line-height: 1.35;
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recent-info { font-size: 11px; color: var(--muted); }
  .recent-info b { color: var(--saffron); font-weight: 600; }

  /* Empty state */
  .empty {
    background: var(--card-2); border: 1px dashed var(--line); border-radius: 12px;
    padding: 28px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.55;
  }
  .empty .em-title { font-family: var(--serif); font-size: 17px; color: var(--text); margin-bottom: 6px; font-weight: 500; letter-spacing: -0.015em; }

  /* Detail panel (paper view) */
  .back-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; }
  .back-row .back { font-size: 20px; color: var(--muted); width: 24px; }
  .back-row .crumb { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .page-title { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }

  .topic-strip {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.12s;
  }
  .topic-strip:hover { background: var(--card-2); }
  .topic-strip.active { background: var(--card-2); border-color: var(--accent-2); }
  .topic-name { font-family: var(--serif); font-size: 16px; font-weight: 500; letter-spacing: -0.015em; margin-bottom: 6px; }
  .topic-strip.active .topic-name { color: var(--accent); }
  .topic-stats { display: flex; gap: 12px; font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .topic-stats span b { color: var(--text); font-family: var(--serif); font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .questions-list { margin-left: 14px; padding-left: 14px; border-left: 2px solid var(--accent-2); margin-top: 4px; margin-bottom: 14px; }
  .question-row {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 6px; cursor: pointer;
  }
  .question-text { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 8px; letter-spacing: -0.005em; }
  .question-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); }
  .topper-pill { background: var(--saffron); color: #fdf6f0; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; margin-right: 4px; }
  .topper-pill.alt { background: var(--accent-2); }
  .topper-pill.alt2 { background: var(--good); }
  .topper-pill.alt3 { background: var(--gs2); }

  /* Answer detail */
  .question-card {
    background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--accent-2);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
    font-size: 14px; line-height: 1.55; letter-spacing: -0.005em;
  }
  .question-card .label { font-size: 10px; color: var(--accent-2); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .answer-meta-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .topper-line { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .topper-name { font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.02em; }
  .topper-rank { font-family: var(--serif); font-size: 14px; color: var(--saffron); font-weight: 600; font-variant-numeric: tabular-nums; }
  .topper-year { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
  .topper-stats { display: flex; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .topper-stats .ts { flex: 1; background: var(--card); padding: 8px 10px; }
  .topper-stats .v { font-family: var(--serif); font-size: 15px; font-weight: 500; letter-spacing: -0.015em; font-variant-numeric: tabular-nums; }
  .topper-stats .l { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .answer-images { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .answer-img-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; cursor: zoom-in; }
  .answer-img-wrap img { width: 100%; display: block; }
  .answer-actions { display: flex; gap: 8px; margin-bottom: 14px; }
  .ans-btn { flex: 1; background: var(--text); color: var(--bg); border: 0; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--sans); }
  .ans-btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
  .ans-btn.saved { background: var(--saffron); color: #1c1500; }

  /* Add answer modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(31,28,20,0.45); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: flex-end; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 20px; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; }
  .modal h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; font-weight: 500; }
  .modal input, .modal select, .modal textarea {
    width: 100%; background: var(--bg-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit;
  }
  .modal textarea { min-height: 70px; resize: vertical; }
  .modal .row { display: flex; gap: 8px; }
  .modal .row > * { flex: 1; }
  .modal .footer { display: flex; gap: 8px; margin-top: 14px; }
  .modal .footer button { flex: 1; padding: 11px; border: 0; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .modal .footer .save { background: var(--text); color: var(--bg); }
  .modal .footer .cancel { background: transparent; color: var(--muted); border: 1px solid var(--line); }

  /* Lightbox for image zoom */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; }
  .lightbox .close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* Floating add button */
  .fab {
    position: fixed; right: 16px; bottom: calc(env(safe-area-inset-bottom, 0) + 78px);
    background: var(--accent-2); color: #fdf6f0; border: 0;
    width: 52px; height: 52px; border-radius: 50%; font-size: 22px;
    box-shadow: 0 4px 16px rgba(204,120,92,0.35); cursor: pointer; z-index: 50;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: rgba(250,247,237,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(env(safe-area-inset-bottom, 12px) + 10px);
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
  }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: 0; padding: 6px 4px; color: var(--muted-2); font-size: 10px; font-weight: 500; cursor: pointer; font-family: var(--sans); letter-spacing: 0.02em; }
  .nav-btn .nav-icon { font-size: 18px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active .nav-icon { color: var(--accent); }

  .view { display: none; }
  .view.active { display: block; }

  .toast {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 12px;
    font-weight: 500; font-size: 14px; z-index: 300;
  }
</style>
</head>
<body>

<div class="app">
  <!-- HOME / BROWSE -->
  <section class="view active" id="view-browse">
    <div class="header">
      <div>
        <div class="brand-name">Adarsh</div>
        <div class="brand-sub">आदर्श · model copies</div>
      </div>
      <div class="icon-row">
        <button class="icon-btn" onclick="goView('saved')" title="Saved">★</button>
      </div>
    </div>

    <div class="search">
      <span>⌕</span>
      <input id="searchInput" placeholder="Search topic, topper, year..." oninput="onSearch()"/>
    </div>

    <div class="sec-label"><span>Browse by paper</span></div>
    <div class="papers-grid" id="papersGrid"></div>

    <div class="sec-label" id="recentLabel"><span>Recently opened</span></div>
    <div id="recentList"></div>
  </section>

  <!-- PAPER DETAIL -->
  <section class="view" id="view-paper">
    <div class="back-row" onclick="goView('browse')"><span class="back">←</span><span class="crumb" id="paperCrumb">Adarsh</span></div>
    <div class="page-title" id="paperTitle"></div>
    <div class="page-sub" id="paperSub"></div>
    <div id="topicsList"></div>
  </section>

  <!-- ANSWER DETAIL -->
  <section class="view" id="view-answer">
    <div class="back-row" onclick="goBackFromAnswer()"><span class="back">←</span><span class="crumb" id="ansCrumb"></span></div>
    <div class="question-card" id="ansQuestion"></div>
    <div class="answer-meta-card" id="ansMeta"></div>
    <div class="answer-images" id="ansImages"></div>
    <div class="answer-actions">
      <button class="ans-btn" id="ansSaveBtn" onclick="toggleSaveAnswer()">★ Save</button>
      <button class="ans-btn ghost" onclick="shareAnswer()">Share</button>
    </div>
  </section>

  <!-- SAVED -->
  <section class="view" id="view-saved">
    <div class="back-row" onclick="goView('browse')"><span class="back">←</span><span class="crumb">Adarsh</span></div>
    <div class="page-title">Saved</div>
    <div class="page-sub">Bookmarked answers</div>
    <div id="savedList"></div>
  </section>

  <!-- RECENT -->
  <section class="view" id="view-recent">
    <div class="back-row" onclick="goView('browse')"><span class="back">←</span><span class="crumb">Adarsh</span></div>
    <div class="page-title">Recent</div>
    <div class="page-sub">Last 30 answers you viewed</div>
    <div id="recentFullList"></div>
  </section>

  <!-- TOPPERS -->
  <section class="view" id="view-toppers">
    <div class="back-row" onclick="goView('browse')"><span class="back">←</span><span class="crumb">Adarsh</span></div>
    <div class="page-title">Toppers</div>
    <div class="page-sub">Browse by topper instead of paper</div>
    <div id="toppersList"></div>
  </section>
</div>

<!-- Add answer FAB -->
<button class="fab" onclick="openAddAnswer()" title="Add topper answer">+</button>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" data-view="browse" onclick="goView('browse')"><span class="nav-icon">⌕</span><span>Browse</span></button>
  <button class="nav-btn" data-view="saved" onclick="goView('saved')"><span class="nav-icon">★</span><span>Saved</span></button>
  <button class="nav-btn" data-view="recent" onclick="goView('recent')"><span class="nav-icon">↻</span><span>Recent</span></button>
  <button class="nav-btn" data-view="toppers" onclick="goView('toppers')"><span class="nav-icon">◐</span><span>Toppers</span></button>
</div>

<!-- Add answer modal -->
<div class="modal-bg" id="addModal" onclick="if(event.target===this)closeAddAnswer()">
  <div class="modal">
    <h2>Add topper answer</h2>
    <label>Paper</label>
    <select id="addPaper"></select>
    <label>Sub-topic</label>
    <select id="addTopic"></select>
    <label>Question text</label>
    <textarea id="addQuestion" placeholder='"Critically examine..." (15 marks · 2023)'></textarea>
    <div class="row">
      <div><label>Marks</label><input id="addMarks" placeholder="15"/></div>
      <div><label>Year</label><input id="addYear" placeholder="2023"/></div>
    </div>
    <div class="row">
      <div><label>Topper name</label><input id="addTopper" placeholder="Shruti Sharma"/></div>
      <div><label>AIR</label><input id="addRank" placeholder="1"/></div>
    </div>
    <div class="row">
      <div><label>Got marks</label><input id="addGot" placeholder="13"/></div>
      <div><label>Pages</label><input id="addPages" placeholder="2"/></div>
    </div>
    <label>Image URLs (one per line — GitHub raw URL or any direct link)</label>
    <textarea id="addImages" placeholder="https://raw.githubusercontent.com/.../answer-p1.jpg
https://raw.githubusercontent.com/.../answer-p2.jpg"></textarea>
    <label>Notes (optional — what makes this answer good)</label>
    <textarea id="addNotes" placeholder="Strong intro · 3 examples · clean diagram on page 2"></textarea>
    <div class="footer">
      <button class="cancel" onclick="closeAddAnswer()">Cancel</button>
      <button class="save" onclick="saveAddAnswer()">Save answer</button>
    </div>
  </div>
</div>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div>
  <img id="lightboxImg" alt="answer page"/>
</div>

<script>
// ============ DATA STRUCTURE ============
const PAPERS = [
  { key: "gs1", name: "GS Paper I", desc: "History · Geography · Society · Culture", color: "var(--gs1)",
    topics: ["Modern India: Freedom Struggle", "Modern India: Post-Independence", "World History", "Indian Society", "Indian Heritage & Culture", "Indian Geography", "World Geography", "Geophysical phenomena", "Women, Population, Poverty", "Urbanization & Globalization"] },
  { key: "gs2", name: "GS Paper II", desc: "Polity · Governance · IR · Welfare", color: "var(--gs2)",
    topics: ["Constitution & Features", "Constitutional Amendments", "Federalism", "Separation of Powers", "Parliament & State Legislatures", "Executive & Judiciary", "Pressure Groups & RPA", "Statutory & Constitutional Bodies", "Governance & Citizen Charters", "Welfare Schemes", "Health, Education, HR", "Social Justice", "IR · Neighbours", "IR · Bilateral & Groupings", "India & World Issues"] },
  { key: "gs3", name: "GS Paper III", desc: "Economy · S&T · Env · Security", color: "var(--gs3)",
    topics: ["Indian Economy", "Inclusive Growth", "Government Budgeting", "Agriculture & Cropping", "Food Processing", "Land Reforms", "Effects of Liberalization", "Infrastructure", "Investment Models", "S&T · Awareness", "S&T · IT, Space, Biotech", "Environment & Conservation", "Disaster Management", "Internal Security · Linkages", "Border Management", "Money Laundering & Terrorism"] },
  { key: "gs4", name: "GS Paper IV", desc: "Ethics · Integrity · Case studies", color: "var(--gs4)",
    topics: ["Ethics & Human Interface", "Attitude", "Aptitude & Foundational Values", "Emotional Intelligence", "Indian/Western Thinkers", "Public Service Values", "Probity in Governance", "Case Studies"] },
  { key: "essay", name: "Essay", desc: "Philosophical · Social · Topical", color: "var(--essay)",
    topics: ["Philosophical essays", "Society & culture essays", "Economy essays", "Polity / IR essays", "Topical / current"] },
  { key: "math", name: "Math Optional", desc: "Paper I & II · LA · Calc · ODE · Mech", color: "var(--opt)",
    topics: ["Paper 1 · Linear Algebra", "Paper 1 · Calculus", "Paper 1 · Analytic Geometry", "Paper 1 · ODE", "Paper 1 · Dynamics & Statics", "Paper 1 · Vector Analysis", "Paper 2 · Modern Algebra", "Paper 2 · Real Analysis", "Paper 2 · Complex Analysis", "Paper 2 · Linear Programming", "Paper 2 · PDE", "Paper 2 · Numerical & CP", "Paper 2 · Mechanics & Fluid"] }
];

// ============ STATE (localStorage for now; cloud sync later) ============
function loadState() {
  const raw = localStorage.getItem("adarsh-state-v1");
  if (raw) try { return JSON.parse(raw); } catch {}
  return {
    answers: [],  // each: { id, paper, topic, question, marks, year, topper, rank, got, pages, images:[], notes, createdAt }
    saved: [],    // answer ids
    recent: [],   // answer ids, most recent first
  };
}
function save() { localStorage.setItem("adarsh-state-v1", JSON.stringify(state)); }
let state = loadState();

// ============ NAV ============
let currentView = "browse";
let activeTopic = null;
let viewingAnswerId = null;
let viewingFromPaper = null;

function goView(v) {
  currentView = v;
  document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id === "view-" + v));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  window.scrollTo({ top: 0, behavior: "instant" });
  if (v === "browse") renderBrowse();
  if (v === "saved") renderSaved();
  if (v === "recent") renderRecent();
  if (v === "toppers") renderToppers();
}

// ============ BROWSE ============
function paperStats(paperKey) {
  const ans = state.answers.filter(a => a.paper === paperKey);
  const toppers = new Set(ans.map(a => a.topper));
  return { count: ans.length, toppers: toppers.size };
}
function renderBrowse() {
  const grid = document.getElementById("papersGrid");
  grid.innerHTML = PAPERS.map(p => {
    const s = paperStats(p.key);
    return `<div class="paper-card" onclick="openPaper('${p.key}')">
      <div class="stripe" style="background:${p.color}"></div>
      <div class="pname">${p.name}</div>
      <div class="pdesc">${p.desc}</div>
      <div class="pstats"><span><b>${s.count}</b> answers</span><span><b>${s.toppers}</b> toppers</span></div>
    </div>`;
  }).join("");

  const recent = state.recent.slice(0, 3).map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  const recentEl = document.getElementById("recentList");
  const labelEl = document.getElementById("recentLabel");
  if (recent.length === 0) {
    labelEl.style.display = "flex";
    recentEl.innerHTML = `<div class="empty">
      <div class="em-title">No answers yet</div>
      <div>Tap the <b style="color:var(--accent-2)">+</b> button bottom-right to add your first topper copy.<br>Or paste image URLs from your data source.</div>
    </div>`;
  } else {
    labelEl.style.display = "flex";
    recentEl.innerHTML = recent.map(a => {
      const paper = PAPERS.find(p => p.key === a.paper);
      return `<div class="recent-card" onclick="openAnswer('${a.id}', null)">
        <div class="recent-thumb">${(a.topper||'??').slice(0,2).toUpperCase()}</div>
        <div class="recent-meta">
          <div class="recent-q">${escapeHtml(a.question || "(no question)")}</div>
          <div class="recent-info"><b>${escapeHtml(a.topper||"")}</b> · AIR ${a.rank||"—"} · ${a.year||"—"} · ${paper?.name||a.paper}</div>
        </div>
      </div>`;
    }).join("");
  }
}

// ============ PAPER DETAIL ============
function openPaper(paperKey) {
  const paper = PAPERS.find(p => p.key === paperKey);
  if (!paper) return;
  document.getElementById("paperTitle").textContent = paper.name;
  document.getElementById("paperCrumb").textContent = "Adarsh · " + paper.name;
  const ans = state.answers.filter(a => a.paper === paperKey);
  const toppers = new Set(ans.map(a => a.topper));
  document.getElementById("paperSub").textContent = `${ans.length} topper answers across ${paper.topics.length} sub-topics · ${toppers.size} toppers`;
  activeTopic = null;
  viewingFromPaper = paperKey;
  renderTopics(paper);
  goView("paper");
}
function renderTopics(paper) {
  const el = document.getElementById("topicsList");
  el.innerHTML = paper.topics.map(topic => {
    const ans = state.answers.filter(a => a.paper === paper.key && a.topic === topic);
    const toppers = new Set(ans.map(a => a.topper));
    const isActive = activeTopic === topic;
    const questionsHtml = isActive ? renderQuestionsForTopic(paper.key, topic, ans) : "";
    return `<div class="topic-strip ${isActive?'active':''}" onclick="toggleTopic('${escapeHtml(topic)}', this)">
      <div class="topic-name">${escapeHtml(topic)}</div>
      <div class="topic-stats"><span><b>${ans.length}</b> answers</span><span><b>${toppers.size}</b> toppers</span></div>
    </div>${questionsHtml}`;
  }).join("");
}
function toggleTopic(topic, el) {
  activeTopic = activeTopic === topic ? null : topic;
  const paper = PAPERS.find(p => p.key === viewingFromPaper);
  renderTopics(paper);
}
function renderQuestionsForTopic(paperKey, topic, ans) {
  // group answers by question
  const byQ = {};
  ans.forEach(a => {
    const k = a.question || "(no question)";
    if (!byQ[k]) byQ[k] = { question: k, marks: a.marks, year: a.year, answers: [] };
    byQ[k].answers.push(a);
  });
  const list = Object.values(byQ);
  if (list.length === 0) {
    return `<div class="questions-list"><div class="empty" style="margin-bottom: 6px;">
      <div class="em-title">No answers yet for "${escapeHtml(topic)}"</div>
      <div>Tap <b style="color:var(--accent-2)">+</b> to add one.</div>
    </div></div>`;
  }
  return `<div class="questions-list">${list.map(q => {
    const pills = q.answers.slice(0,3).map((a,i) => {
      const cls = ["", " alt", " alt2", " alt3"][i] || "";
      const initials = (a.topper||'??').split(/\s+/).map(x=>x[0]).join('').slice(0,2).toUpperCase();
      return `<span class="topper-pill${cls}" onclick="event.stopPropagation(); openAnswer('${a.id}', '${paperKey}')">${initials} · ${a.rank||'—'}</span>`;
    }).join('');
    return `<div class="question-row" onclick="openAnswer('${q.answers[0].id}', '${paperKey}')">
      <div class="question-text">${escapeHtml(q.question)}</div>
      <div class="question-meta">
        <div>${pills}</div>
        <div>${q.year||'—'} · ${q.marks||'—'}M</div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ============ ANSWER DETAIL ============
function openAnswer(answerId, fromPaper) {
  const a = state.answers.find(x => x.id === answerId);
  if (!a) return;
  viewingAnswerId = answerId;
  if (fromPaper) viewingFromPaper = fromPaper;
  // bump recent
  state.recent = [answerId, ...state.recent.filter(id => id !== answerId)].slice(0, 30);
  save();

  const paper = PAPERS.find(p => p.key === a.paper);
  document.getElementById("ansCrumb").textContent = `${paper?.name||a.paper} · ${a.topic||""}`;
  document.getElementById("ansQuestion").innerHTML = `
    <div class="label">Question · ${a.marks||"—"} marks · ${a.year||"—"}</div>
    ${escapeHtml(a.question||"(no question)")}`;
  document.getElementById("ansMeta").innerHTML = `
    <div class="topper-line">
      <div class="topper-name">${escapeHtml(a.topper||"(unknown)")}</div>
      <div class="topper-rank">AIR ${a.rank||"—"}</div>
    </div>
    <div class="topper-year">CSE ${a.year||"—"}${a.notes?' · '+escapeHtml(a.notes):''}</div>
    <div class="topper-stats">
      <div class="ts"><div class="v">${a.got||"—"}${a.marks?'/'+a.marks:""}</div><div class="l">Got</div></div>
      <div class="ts"><div class="v">${a.pages||"—"}</div><div class="l">Pages</div></div>
      <div class="ts"><div class="v">${(a.images||[]).length}</div><div class="l">Scans</div></div>
    </div>`;
  document.getElementById("ansImages").innerHTML = (a.images||[]).map(url =>
    `<div class="answer-img-wrap" onclick="openLightbox('${escapeAttr(url)}')"><img loading="lazy" src="${escapeAttr(url)}" alt="answer page"/></div>`
  ).join("") || `<div class="empty"><div class="em-title">No images attached</div><div>Edit this answer and paste image URLs to view the scanned copy.</div></div>`;

  const saveBtn = document.getElementById("ansSaveBtn");
  if (state.saved.includes(answerId)) {
    saveBtn.textContent = "★ Saved";
    saveBtn.classList.add("saved");
  } else {
    saveBtn.textContent = "★ Save";
    saveBtn.classList.remove("saved");
  }
  goView("answer");
}
function goBackFromAnswer() {
  if (viewingFromPaper) openPaper(viewingFromPaper);
  else goView("browse");
}
function toggleSaveAnswer() {
  if (!viewingAnswerId) return;
  if (state.saved.includes(viewingAnswerId)) state.saved = state.saved.filter(id => id !== viewingAnswerId);
  else state.saved.push(viewingAnswerId);
  save();
  openAnswer(viewingAnswerId);
}
function shareAnswer() {
  const a = state.answers.find(x => x.id === viewingAnswerId);
  if (!a) return;
  const text = `${a.topper} · AIR ${a.rank} · ${a.year}\n\n"${a.question}"\n\nFrom Adarsh.`;
  if (navigator.share) navigator.share({ title: a.topper, text }).catch(()=>{});
  else { navigator.clipboard.writeText(text); toast("Copied to clipboard"); }
}

// ============ SAVED / RECENT / TOPPERS ============
function renderSaved() {
  const el = document.getElementById("savedList");
  const list = state.saved.map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="em-title">Nothing saved yet</div><div>Star answers to find them later here.</div></div>`;
    return;
  }
  el.innerHTML = list.map(a => answerRow(a)).join("");
}
function renderRecent() {
  const el = document.getElementById("recentFullList");
  const list = state.recent.map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="em-title">No recent answers</div><div>Open an answer to see it here.</div></div>`;
    return;
  }
  el.innerHTML = list.map(a => answerRow(a)).join("");
}
function renderToppers() {
  const el = document.getElementById("toppersList");
  const byTopper = {};
  state.answers.forEach(a => {
    const k = (a.topper||"unknown") + "|" + (a.rank||"");
    if (!byTopper[k]) byTopper[k] = { name: a.topper, rank: a.rank, year: a.year, answers: [] };
    byTopper[k].answers.push(a);
  });
  const list = Object.values(byTopper).sort((a,b) => parseInt(a.rank||999) - parseInt(b.rank||999));
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="em-title">No toppers yet</div><div>Add an answer first.</div></div>`;
    return;
  }
  el.innerHTML = list.map(t => `<div class="topic-strip" onclick="filterByTopper('${escapeAttr(t.name)}')">
    <div class="topic-name">${escapeHtml(t.name)} <span style="color:var(--saffron); font-size:13px;">AIR ${t.rank||"—"}</span></div>
    <div class="topic-stats"><span>${t.year||"—"}</span><span><b>${t.answers.length}</b> answers</span></div>
  </div>`).join("");
}
function filterByTopper(topperName) {
  // Just list this topper's answers
  const list = state.answers.filter(a => a.topper === topperName);
  const el = document.getElementById("toppersList");
  el.innerHTML = `<div class="back-row" onclick="renderToppers()" style="margin-bottom: 14px;"><span class="back">←</span><span class="crumb">All toppers</span></div>` +
    list.map(a => answerRow(a)).join("");
}
function answerRow(a) {
  const paper = PAPERS.find(p => p.key === a.paper);
  return `<div class="recent-card" onclick="openAnswer('${a.id}', '${a.paper}')">
    <div class="recent-thumb">${(a.topper||'??').slice(0,2).toUpperCase()}</div>
    <div class="recent-meta">
      <div class="recent-q">${escapeHtml(a.question||"(no question)")}</div>
      <div class="recent-info"><b>${escapeHtml(a.topper||"")}</b> · AIR ${a.rank||"—"} · ${paper?.name||a.paper} · ${escapeHtml(a.topic||"")}</div>
    </div>
  </div>`;
}

// ============ ADD ANSWER ============
function openAddAnswer() {
  // populate paper select
  const paperSel = document.getElementById("addPaper");
  paperSel.innerHTML = PAPERS.map(p => `<option value="${p.key}">${p.name}</option>`).join("");
  paperSel.onchange = updateTopicSelect;
  updateTopicSelect();
  // pre-fill paper if viewing one
  if (viewingFromPaper) {
    paperSel.value = viewingFromPaper;
    updateTopicSelect();
  }
  document.getElementById("addModal").classList.add("open");
}
function updateTopicSelect() {
  const paperKey = document.getElementById("addPaper").value;
  const paper = PAPERS.find(p => p.key === paperKey);
  const topicSel = document.getElementById("addTopic");
  topicSel.innerHTML = paper.topics.map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join("");
  if (activeTopic && paper.topics.includes(activeTopic)) topicSel.value = activeTopic;
}
function closeAddAnswer() { document.getElementById("addModal").classList.remove("open"); }
function saveAddAnswer() {
  const id = "ans-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);
  const imagesRaw = document.getElementById("addImages").value || "";
  const images = imagesRaw.split(/\n+/).map(s => s.trim()).filter(Boolean);
  const a = {
    id,
    paper: document.getElementById("addPaper").value,
    topic: document.getElementById("addTopic").value,
    question: document.getElementById("addQuestion").value.trim(),
    marks: document.getElementById("addMarks").value.trim(),
    year: document.getElementById("addYear").value.trim(),
    topper: document.getElementById("addTopper").value.trim(),
    rank: document.getElementById("addRank").value.trim(),
    got: document.getElementById("addGot").value.trim(),
    pages: document.getElementById("addPages").value.trim(),
    images,
    notes: document.getElementById("addNotes").value.trim(),
    createdAt: Date.now()
  };
  if (!a.topper || !a.question) { alert("Topper name and question are required."); return; }
  state.answers.push(a);
  save();
  ["addQuestion","addMarks","addYear","addTopper","addRank","addGot","addPages","addImages","addNotes"].forEach(id => {
    document.getElementById(id).value = "";
  });
  closeAddAnswer();
  toast("✓ Answer saved");
  if (currentView === "browse") renderBrowse();
  else if (currentView === "paper" && viewingFromPaper) openPaper(viewingFromPaper);
}

// ============ SEARCH ============
function onSearch() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!q) { renderBrowse(); return; }
  const matches = state.answers.filter(a => {
    return [a.question, a.topper, a.year, a.topic, a.notes].filter(Boolean).some(v => v.toLowerCase().includes(q));
  });
  const recentEl = document.getElementById("recentList");
  document.getElementById("recentLabel").innerHTML = `<span>Search: ${matches.length} matches</span>`;
  if (matches.length === 0) {
    recentEl.innerHTML = `<div class="empty"><div class="em-title">No matches</div><div>Try a topper name, year, topic word.</div></div>`;
    return;
  }
  recentEl.innerHTML = matches.slice(0, 12).map(a => answerRow(a)).join("");
}

// ============ LIGHTBOX ============
function openLightbox(url) {
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightboxImg").src = "";
}

// ============ HELPERS ============
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}

// ============ INIT ============
renderBrowse();
</script>
</body>
