<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#faf7ed" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Abhyas" />
<title>Abhyas · अभ्यास</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf7ed; --bg-2: #f5f0e2; --card: #ffffff; --card-2: #fbf7eb;
    --line: #ebe4d2; --line-soft: #f0e9d8;
    --text: #1f1c14; --muted: #6e6760; --muted-2: #9a9389;
    --accent: #b86848; --accent-2: #cc785c;
    --good: #6f8a5e; --bad: #b54f48; --saffron: #d97757;
    --gs1: #c97d5a; --gs2: #7d8f6f; --gs3: #6b8194; --gs4: #a87b95;
    --essay: #8a8265; --opt: #b89149;
    --src-pyq: #6b8194; --src-test: #b89149; --src-teacher: #a87b95; --src-mock: #c97d5a; --src-random: #7d8f6f;
    --serif: "Source Serif 4", ui-serif, Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --r-md: 10px; --r-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); font-family: var(--sans); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.5; }
  .app { max-width: 720px; margin: 0 auto; padding: 16px 18px calc(80px + env(safe-area-inset-bottom, 12px)); }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .brand-name { font-family: var(--serif); font-size: 26px; font-weight: 400; letter-spacing: -0.03em; line-height: 1; }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-variant: small-caps; letter-spacing: 0.08em; }
  .icon-row { display: flex; gap: 5px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 9px; background: var(--card); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); cursor: pointer; font-family: var(--sans); }

  .search { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 16px; margin: 16px 0 22px; display: flex; align-items: center; gap: 10px; color: var(--muted); }
  .search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font-family: inherit; font-size: 14px; }
  .search input::placeholder { color: var(--muted); }

  /* Stats strip */
  .stats-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; margin-bottom: 22px; }
  .stat-cell { background: var(--card); padding: 12px 10px; }
  .stat-cell .v { font-family: var(--serif); font-size: 19px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; font-variant-numeric: tabular-nums; }
  .stat-cell .l { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-cell.accent .v { color: var(--accent); }

  .sec-label { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin: 22px 2px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .sec-label .more { text-transform: none; letter-spacing: 0; font-size: 12px; color: var(--accent-2); font-weight: 500; cursor: pointer; }
  .sec-label:first-of-type { margin-top: 0; }

  /* Source filter chips */
  .source-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .source-chip { background: var(--card); border: 1px solid var(--line); color: var(--muted); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
  .source-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .source-chip .src-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Paper grid */
  .papers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .paper-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 16px 14px; cursor: pointer; transition: background 0.12s; }
  .paper-card:hover { background: var(--card-2); }
  .paper-card .stripe { width: 30px; height: 3px; border-radius: 2px; margin-bottom: 10px; }
  .paper-card .pname { font-family: var(--serif); font-size: 17px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.15; margin-bottom: 4px; }
  .paper-card .pdesc { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
  .paper-card .pstats { display: flex; gap: 10px; font-size: 10.5px; color: var(--muted-2); letter-spacing: 0.02em; }
  .paper-card .pstats b { color: var(--text); font-family: var(--serif); font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.015em; }

  /* Recent / list rows */
  .recent-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 8px; cursor: pointer; }
  .recent-thumb { width: 46px; height: 46px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 13px; color: #fff; font-weight: 600; }
  .recent-meta { flex: 1; min-width: 0; }
  .recent-q { font-size: 13px; font-weight: 500; letter-spacing: -0.005em; line-height: 1.35; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-info { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .recent-info .src-tag { font-size: 10px; padding: 1px 7px; border-radius: 999px; color: #fff; font-weight: 600; letter-spacing: 0.03em; }
  .recent-info .score { color: var(--saffron); font-weight: 600; }

  .empty { background: var(--card-2); border: 1px dashed var(--line); border-radius: 12px; padding: 28px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.55; }
  .empty .em-title { font-family: var(--serif); font-size: 17px; color: var(--text); margin-bottom: 6px; font-weight: 500; letter-spacing: -0.015em; }

  /* Detail / paper view */
  .back-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; }
  .back-row .back { font-size: 20px; color: var(--muted); width: 24px; }
  .back-row .crumb { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .page-title { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }

  .topic-strip { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.12s; }
  .topic-strip:hover { background: var(--card-2); }
  .topic-strip.active { background: var(--card-2); border-color: var(--accent-2); }
  .topic-name { font-family: var(--serif); font-size: 16px; font-weight: 500; letter-spacing: -0.015em; margin-bottom: 6px; }
  .topic-strip.active .topic-name { color: var(--accent); }
  .topic-stats { display: flex; gap: 12px; font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .topic-stats span b { color: var(--text); font-family: var(--serif); font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }

  /* Answer detail */
  .question-card { background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--accent-2); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; font-size: 14px; line-height: 1.55; letter-spacing: -0.005em; }
  .question-card .label { font-size: 10px; color: var(--accent-2); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .meta-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .meta-line { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .meta-title { font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.02em; }
  .meta-date { font-family: var(--serif); font-size: 13px; color: var(--saffron); font-weight: 500; font-variant-numeric: tabular-nums; }
  .meta-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
  .meta-stats { display: flex; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .meta-stats .ts { flex: 1; background: var(--card); padding: 8px 10px; }
  .meta-stats .v { font-family: var(--serif); font-size: 15px; font-weight: 500; letter-spacing: -0.015em; font-variant-numeric: tabular-nums; }
  .meta-stats .l { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .answer-images { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .answer-img-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; cursor: zoom-in; }
  .answer-img-wrap img { width: 100%; display: block; }
  .answer-actions { display: flex; gap: 8px; margin-bottom: 18px; }
  .ans-btn { flex: 1; background: var(--text); color: var(--bg); border: 0; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--sans); }
  .ans-btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
  .ans-btn.saved { background: var(--saffron); color: #1c1500; }

  /* Evaluation block */
  .eval-section-title { font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.015em; margin: 20px 0 10px; }
  .eval-card { background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--good); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .eval-card .eval-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .eval-card .eval-by { font-family: var(--serif); font-size: 15px; font-weight: 500; letter-spacing: -0.015em; }
  .eval-card .eval-date { font-size: 11px; color: var(--muted); }
  .eval-card .eval-score { display: inline-block; background: var(--good); color: #fff; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-bottom: 10px; font-family: var(--serif); }
  .eval-card .eval-comments { font-size: 14px; line-height: 1.55; margin-bottom: 10px; white-space: pre-wrap; letter-spacing: -0.003em; }
  .eval-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .eval-tag { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--card-2); border: 1px solid var(--line); color: var(--muted); font-weight: 500; }
  .eval-tag.strength { background: rgba(111,138,94,0.12); border-color: var(--good); color: var(--good); }
  .eval-tag.weakness { background: rgba(181,79,72,0.1); border-color: var(--bad); color: var(--bad); }
  .eval-tags-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(31,28,20,0.45); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: flex-end; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 20px; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; }
  .modal h2 { font-family: var(--serif); font-size: 20px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; font-weight: 500; }
  .modal input, .modal select, .modal textarea { width: 100%; background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; }
  .modal textarea { min-height: 70px; resize: vertical; }
  .modal .row { display: flex; gap: 8px; }
  .modal .row > * { flex: 1; }
  .modal .footer { display: flex; gap: 8px; margin-top: 14px; }
  .modal .footer button { flex: 1; padding: 11px; border: 0; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .modal .footer .save { background: var(--text); color: var(--bg); }
  .modal .footer .cancel { background: transparent; color: var(--muted); border: 1px solid var(--line); }

  .photo-upload { display: flex; gap: 8px; margin: 6px 0 4px; align-items: center; flex-wrap: wrap; }
  .photo-btn { background: var(--bg-2); border: 1px solid var(--line); color: var(--text); padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
  .photo-btn:hover { background: var(--card-2); border-color: var(--muted-2); }
  .photo-btn input { display: none; }
  .photo-thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
  .photo-thumb { width: 60px; height: 60px; border-radius: 6px; background-size: cover; background-position: center; border: 1px solid var(--line); position: relative; }
  .photo-thumb .remove { position: absolute; top: -6px; right: -6px; background: var(--bad); color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; border: 2px solid var(--bg); }

  /* Lightbox */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; }
  .lightbox .close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* FAB */
  .fab { position: fixed; right: 16px; bottom: calc(env(safe-area-inset-bottom, 0) + 78px); background: var(--accent-2); color: #fdf6f0; border: 0; width: 52px; height: 52px; border-radius: 50%; font-size: 22px; box-shadow: 0 4px 16px rgba(204,120,92,0.35); cursor: pointer; z-index: 50; }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(250,247,237,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--line); padding: 10px 14px calc(env(safe-area-inset-bottom, 12px) + 10px); display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: 0; padding: 6px 4px; color: var(--muted-2); font-size: 10px; font-weight: 500; cursor: pointer; font-family: var(--sans); letter-spacing: 0.02em; }
  .nav-btn .nav-icon { font-size: 18px; }
  .nav-btn.active { color: var(--accent); }

  .view { display: none; }
  .view.active { display: block; }
  .toast { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 12px; font-weight: 500; font-size: 14px; z-index: 300; }

  /* Source colors */
  .src-pyq { background: var(--src-pyq); }
  .src-test { background: var(--src-test); }
  .src-teacher { background: var(--src-teacher); }
  .src-mock { background: var(--src-mock); }
  .src-random { background: var(--src-random); }
</style>
</head>
<body>

<div class="app">
  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="header">
      <div>
        <div class="brand-name">Abhyas</div>
        <div class="brand-sub">अभ्यास · practice log</div>
      </div>
      <div class="icon-row">
        <button class="icon-btn" onclick="goView('saved')" title="Saved">★</button>
      </div>
    </div>

    <div class="search">
      <span>⌕</span>
      <input id="searchInput" placeholder="Search question, topic, year..." oninput="onSearch()"/>
    </div>

    <div class="stats-strip" id="statsStrip"></div>

    <div class="sec-label"><span>Filter by source</span></div>
    <div class="source-chips" id="sourceChips"></div>

    <div class="sec-label"><span>Browse by paper</span></div>
    <div class="papers-grid" id="papersGrid"></div>

    <div class="sec-label" id="recentLabel"><span>Recent attempts</span></div>
    <div id="recentList"></div>
  </section>

  <!-- PAPER -->
  <section class="view" id="view-paper">
    <div class="back-row" onclick="goView('home')"><span class="back">←</span><span class="crumb" id="paperCrumb">Abhyas</span></div>
    <div class="page-title" id="paperTitle"></div>
    <div class="page-sub" id="paperSub"></div>
    <div id="topicsList"></div>
  </section>

  <!-- ANSWER DETAIL -->
  <section class="view" id="view-answer">
    <div class="back-row" onclick="goBackFromAnswer()"><span class="back">←</span><span class="crumb" id="ansCrumb"></span></div>
    <div class="question-card" id="ansQuestion"></div>
    <div class="meta-card" id="ansMeta"></div>
    <div class="answer-images" id="ansImages"></div>
    <div class="answer-actions">
      <button class="ans-btn" id="ansSaveBtn" onclick="toggleSaveAnswer()">★ Save</button>
      <button class="ans-btn ghost" onclick="openAddEval()">+ Evaluation</button>
      <button class="ans-btn ghost" onclick="shareForEval()">📤 Share for eval</button>
    </div>
    <div id="evalSection"></div>
  </section>

  <!-- SAVED -->
  <section class="view" id="view-saved">
    <div class="back-row" onclick="goView('home')"><span class="back">←</span><span class="crumb">Abhyas</span></div>
    <div class="page-title">Saved</div>
    <div class="page-sub">Bookmarked attempts</div>
    <div id="savedList"></div>
  </section>

  <!-- RECENT -->
  <section class="view" id="view-recent">
    <div class="back-row" onclick="goView('home')"><span class="back">←</span><span class="crumb">Abhyas</span></div>
    <div class="page-title">Recent</div>
    <div class="page-sub">Last 30 attempts you opened</div>
    <div id="recentFullList"></div>
  </section>

  <!-- INSIGHTS -->
  <section class="view" id="view-insights">
    <div class="back-row" onclick="goView('home')"><span class="back">←</span><span class="crumb">Abhyas</span></div>
    <div class="page-title">Insights</div>
    <div class="page-sub">Strengths and weaknesses across all your evaluations</div>
    <div id="insightsContent"></div>
  </section>
</div>

<button class="fab" onclick="openAddAnswer()" title="Add answer">+</button>

<div class="bottom-nav">
  <button class="nav-btn active" data-view="home" onclick="goView('home')"><span class="nav-icon">⌕</span><span>Browse</span></button>
  <button class="nav-btn" data-view="saved" onclick="goView('saved')"><span class="nav-icon">★</span><span>Saved</span></button>
  <button class="nav-btn" data-view="recent" onclick="goView('recent')"><span class="nav-icon">↻</span><span>Recent</span></button>
  <button class="nav-btn" data-view="insights" onclick="goView('insights')"><span class="nav-icon">◐</span><span>Insights</span></button>
</div>

<!-- Add answer modal -->
<div class="modal-bg" id="addModal" onclick="if(event.target===this)closeAddAnswer()">
  <div class="modal">
    <h2>Add answer attempt</h2>
    <div class="row">
      <div><label>Source</label><select id="addSource">
        <option value="pyq">📘 PYQ</option>
        <option value="test">📝 Test Series</option>
        <option value="teacher">👨‍🏫 Teacher's Q</option>
        <option value="mock">🎯 Mock test</option>
        <option value="random">🎲 Random practice</option>
      </select></div>
      <div><label>Date</label><input id="addDate" type="date"/></div>
    </div>
    <label>Paper</label>
    <select id="addPaper"></select>
    <label>Sub-topic</label>
    <select id="addTopic"></select>
    <label>Question text</label>
    <textarea id="addQuestion" placeholder='"Critically examine..." or paste full question'></textarea>
    <div class="row">
      <div><label>Marks (total)</label><input id="addMarks" placeholder="15"/></div>
      <div><label>Year / Test</label><input id="addYear" placeholder="2023 / TS-7"/></div>
    </div>
    <div class="row">
      <div><label>Self-score</label><input id="addSelfScore" placeholder="9 / 15"/></div>
      <div><label>Time (min)</label><input id="addTime" placeholder="8"/></div>
    </div>
    <label>📷 Photos of your answer (camera or gallery)</label>
    <div class="photo-upload">
      <label class="photo-btn">📷 Take photo
        <input type="file" accept="image/*" capture="environment" onchange="handlePhotoUpload(event, 'answer')" multiple/>
      </label>
      <label class="photo-btn">🖼️ Gallery
        <input type="file" accept="image/*" onchange="handlePhotoUpload(event, 'answer')" multiple/>
      </label>
    </div>
    <div class="photo-thumbs" id="answerPhotoThumbs"></div>
    <label>Quick notes (what worked, what was missing)</label>
    <textarea id="addNotes" placeholder="Introduction was weak · forgot to add diagram · good current affairs link"></textarea>
    <div class="footer">
      <button class="cancel" onclick="closeAddAnswer()">Cancel</button>
      <button class="save" onclick="saveAddAnswer()">Save</button>
    </div>
  </div>
</div>

<script>
// ============ DATA ============
const PAPERS = [

    topics: ["Paper 1 · Linear Algebra", "Paper 1 · Calculus", "Paper 1 · Analytic Geometry", "Paper 1 · ODE", "Paper 1 · Dynamics & Statics", "Paper 1 · Vector Analysis", "Paper 2 · Modern Algebra", "Paper 2 · Real Analysis", "Paper 2 · Complex Analysis", "Paper 2 · Linear Programming", "Paper 2 · PDE", "Paper 2 · Numerical & CP", "Paper 2 · Mechanics & Fluid"] }
];

const SOURCES = [
  { key: "pyq", name: "PYQ", icon: "📘" },
  { key: "test", name: "Test Series", icon: "📝" },
  { key: "teacher", name: "Teacher", icon: "👨‍🏫" },
  { key: "mock", name: "Mock", icon: "🎯" },
  { key: "random", name: "Random", icon: "🎲" }
];

// ============ STATE ============
function loadState() {
  const raw = localStorage.getItem("abhyas-state-v1");
  if (raw) try { return JSON.parse(raw); } catch {}
  // migrate from adarsh if exists
  const old = localStorage.getItem("adarsh-state-v1");
  if (old) try {
    const oldState = JSON.parse(old);
    // keep only "mine" type entries
    return {
      answers: (oldState.answers||[]).filter(a => a.type === "mine" || !a.type).map(a => ({
        id: a.id, source: a.source || "pyq", paper: a.paper, topic: a.topic,
        question: a.question, marks: a.marks, year: a.year,
        attemptDate: a.attemptDate || (a.createdAt ? new Date(a.createdAt).toISOString().slice(0,10) : ""),
        selfScore: a.got || "", timeMin: a.timeMin || "",
        images: a.images || [], notes: a.notes || "",
        evaluation: null,
        createdAt: a.createdAt || Date.now()
      })),
      saved: oldState.saved || [],
      recent: oldState.recent || [],
      sourceFilter: "all"
    };
  } catch {}
  return { answers: [], saved: [], recent: [], sourceFilter: "all" };
}
function save() { localStorage.setItem("abhyas-state-v1", JSON.stringify(state)); }
let state = loadState();

// ============ NAV ============
let currentView = "home";
let activeTopic = null;
let viewingAnswerId = null;
let viewingFromPaper = null;
let photosFor = "answer"; // "answer" or "eval"
let answerPhotos = [];
let evalPhotos = [];

function goView(v) {
  currentView = v;
  document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id === "view-" + v));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  window.scrollTo({ top: 0 });
  if (v === "home") renderHome();
  if (v === "saved") renderSaved();
  if (v === "recent") renderRecent();
  if (v === "insights") renderInsights();
}

// ============ HOME ============
function filteredAnswers() {
  if (state.sourceFilter === "all") return state.answers;
  return state.answers.filter(a => a.source === state.sourceFilter);
}

function paperStats(paperKey) {
  const ans = filteredAnswers().filter(a => a.paper === paperKey);
  return { count: ans.length, evaluated: ans.filter(a => a.evaluation).length };
}

function renderHome() {
  // Stats strip
  const all = state.answers;
  const evaluated = all.filter(a => a.evaluation).length;
  const thisWeek = all.filter(a => {
    const d = new Date(a.attemptDate || a.createdAt);
    return (Date.now() - d.getTime()) < 7*86400000;
  }).length;
  const sources = new Set(all.map(a => a.source)).size;
  document.getElementById("statsStrip").innerHTML = `
    <div class="stat-cell"><div class="v">${all.length}</div><div class="l">Total</div></div>
    <div class="stat-cell"><div class="v">${thisWeek}</div><div class="l">This week</div></div>
    <div class="stat-cell"><div class="v">${evaluated}</div><div class="l">Evaluated</div></div>
    <div class="stat-cell accent"><div class="v">${all.length - evaluated}</div><div class="l">Pending eval</div></div>`;

  // Source chips
  const chips = [
    `<button class="source-chip ${state.sourceFilter==='all'?'active':''}" onclick="setSource('all')">All · ${all.length}</button>`,
    ...SOURCES.map(s => {
      const count = all.filter(a => a.source === s.key).length;
      return `<button class="source-chip ${state.sourceFilter===s.key?'active':''}" onclick="setSource('${s.key}')"><span class="src-dot src-${s.key}"></span>${s.icon} ${s.name} · ${count}</button>`;
    })
  ].join("");
  document.getElementById("sourceChips").innerHTML = chips;

  // Papers grid
  const grid = document.getElementById("papersGrid");
  grid.innerHTML = PAPERS.map(p => {
    const s = paperStats(p.key);
    return `<div class="paper-card" onclick="openPaper('${p.key}')">
      <div class="stripe" style="background:${p.color}"></div>
      <div class="pname">${p.name}</div>
      <div class="pdesc">${p.desc}</div>
      <div class="pstats"><span><b>${s.count}</b> attempts</span><span><b>${s.evaluated}</b> evaluated</span></div>
    </div>`;
  }).join("");

  // Recent
  const recent = state.recent.slice(0, 3).map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  const recentEl = document.getElementById("recentList");
  if (recent.length === 0 && all.length === 0) {
    recentEl.innerHTML = `<div class="empty">
      <div class="em-title">No attempts yet</div>
      <div>Tap the <b style="color:var(--accent-2)">+</b> button bottom-right to log your first answer.<br>Photograph it, score it, get it evaluated, learn from it.</div>
    </div>`;
  } else {
    const list = recent.length > 0 ? recent : all.slice(0, 3);
    recentEl.innerHTML = list.map(answerRow).join("");
  }
}
function setSource(s) { state.sourceFilter = s; save(); renderHome(); }

function answerRow(a) {
  const paper = PAPERS.find(p => p.key === a.paper);
  const src = SOURCES.find(s => s.key === a.source);
  const date = a.attemptDate || (a.createdAt ? new Date(a.createdAt).toISOString().slice(0,10) : "");
  return `<div class="recent-card" onclick="openAnswer('${a.id}', '${a.paper}')">
    <div class="recent-thumb src-${a.source}">${(src?.icon||"✍")}</div>
    <div class="recent-meta">
      <div class="recent-q">${escapeHtml(a.question||"(no question)")}</div>
      <div class="recent-info">
        <span class="src-tag src-${a.source}">${src?.name||"—"}</span>
        <span>${paper?.name||""}</span>
        <span>· ${date}</span>
        ${a.evaluation?.score?`<span class="score">· ${escapeHtml(a.evaluation.score)}</span>`:""}
      </div>
    </div>
  </div>`;
}

// ============ PAPER ============
function openPaper(paperKey) {
  const paper = PAPERS.find(p => p.key === paperKey);
  if (!paper) return;
  document.getElementById("paperTitle").textContent = paper.name;
  document.getElementById("paperCrumb").textContent = "Abhyas · " + paper.name;
  const ans = filteredAnswers().filter(a => a.paper === paperKey);
  const evaluated = ans.filter(a => a.evaluation).length;
  document.getElementById("paperSub").textContent = `${ans.length} attempts · ${evaluated} evaluated · ${paper.topics.length} sub-topics`;
  activeTopic = null;
  viewingFromPaper = paperKey;
  renderTopics(paper);
  goView("paper");
}
function renderTopics(paper) {
  const el = document.getElementById("topicsList");
  el.innerHTML = paper.topics.map(topic => {
    const ans = filteredAnswers().filter(a => a.paper === paper.key && a.topic === topic);
    const evaluated = ans.filter(a => a.evaluation).length;
    const isActive = activeTopic === topic;
    const list = isActive ? renderAttemptsForTopic(ans) : "";
    return `<div class="topic-strip ${isActive?'active':''}" onclick="toggleTopic('${escapeAttr(topic)}')">
      <div class="topic-name">${escapeHtml(topic)}</div>
      <div class="topic-stats"><span><b>${ans.length}</b> attempts</span><span><b>${evaluated}</b> evaluated</span></div>
    </div>${list}`;
  }).join("");
}
function toggleTopic(topic) {
  activeTopic = activeTopic === topic ? null : topic;
  const paper = PAPERS.find(p => p.key === viewingFromPaper);
  renderTopics(paper);
}
function renderAttemptsForTopic(ans) {
  if (ans.length === 0) return `<div class="empty" style="margin-bottom: 6px;"><div class="em-title">No attempts in this topic yet</div><div>Tap + to add one.</div></div>`;
  return `<div style="margin-bottom: 14px;">${ans.map(answerRow).join("")}</div>`;
}

// ============ ANSWER DETAIL ============
function openAnswer(id, fromPaper) {
  const a = state.answers.find(x => x.id === id);
  if (!a) return;
  viewingAnswerId = id;
  if (fromPaper) viewingFromPaper = fromPaper;

  const paper = PAPERS.find(p => p.key === a.paper);

  document.getElementById("ansCrumb").textContent = `${paper?.name||a.paper} · ${a.topic||""}`;
  document.getElementById("ansQuestion").innerHTML = `
    <div class="label">${src?.icon} ${src?.name} · ${a.marks||"—"}M · ${a.year||"—"}</div>
    ${escapeHtml(a.question||"(no question)")}`;
  document.getElementById("ansMeta").innerHTML = `
    <div class="meta-line">
      <div class="meta-title">My attempt</div>
      <div class="meta-date">${a.attemptDate||""}</div>
    </div>
    <div class="meta-sub">${a.notes ? escapeHtml(a.notes) : 'Self-practice'}</div>
    <div class="meta-stats">
      <div class="ts"><div class="v">${a.selfScore||"—"}</div><div class="l">Self-score</div></div>
      <div class="ts"><div class="v">${a.timeMin||"—"}</div><div class="l">Min</div></div>
      <div class="ts"><div class="v">${(a.images||[]).length}</div><div class="l">Pages</div></div>
    </div>`;
  document.getElementById("ansImages").innerHTML = (a.images||[]).map(url =>
    `<div class="answer-img-wrap" onclick="openLightbox('${escapeAttr(url)}')"><img loading="lazy" src="${escapeAttr(url)}" alt="answer page"/></div>`
  ).join("") || `<div class="empty"><div class="em-title">No images attached</div></div>`;

  // Evaluation section
  const evalEl = document.getElementById("evalSection");
  if (a.evaluation) {
    const e = a.evaluation;
    const strengths = (e.strengths||"").split(",").map(s=>s.trim()).filter(Boolean);
    const weaknesses = (e.weaknesses||"").split(",").map(s=>s.trim()).filter(Boolean);
    evalEl.innerHTML = `
      <div class="eval-section-title">📋 Evaluation</div>
      <div class="eval-card">
        <div class="eval-head">
          <div class="eval-by">${escapeHtml(e.by||"Self")}</div>
          <div class="eval-date">${escapeHtml(e.date||"")}</div>
        </div>
        ${e.score?`<div class="eval-score">${escapeHtml(e.score)}</div>`:""}
        <div class="eval-comments">${escapeHtml(e.comments||"")}</div>
        ${strengths.length?`<div class="eval-tags-label">💚 Strengths</div><div class="eval-tags">${strengths.map(s=>`<span class="eval-tag strength">${escapeHtml(s)}</span>`).join("")}</div>`:""}
        ${weaknesses.length?`<div class="eval-tags-label" style="margin-top: 10px;">🩹 To work on</div><div class="eval-tags">${weaknesses.map(s=>`<span class="eval-tag weakness">${escapeHtml(s)}</span>`).join("")}</div>`:""}
        ${e.images?.length ? `<div class="answer-images" style="margin-top:12px;">${e.images.map(u=>`<div class="answer-img-wrap" onclick="openLightbox('${escapeAttr(u)}')"><img loading="lazy" src="${escapeAttr(u)}"/></div>`).join("")}</div>` : ""}
      </div>`;
  } else {
    evalEl.innerHTML = `<div class="empty"><div class="em-title">Not evaluated yet</div><div>Tap "+ Evaluation" above to add teacher's / peer's / self comments.</div></div>`;
  }

  const saveBtn = document.getElementById("ansSaveBtn");
  if (state.saved.includes(id)) { saveBtn.textContent = "★ Saved"; saveBtn.classList.add("saved"); }
  else { saveBtn.textContent = "★ Save"; saveBtn.classList.remove("saved"); }
  goView("answer");
}
function goBackFromAnswer() {
  if (viewingFromPaper) openPaper(viewingFromPaper);
  else goView("home");
}
function toggleSaveAnswer() {
  if (!viewingAnswerId) return;
  if (state.saved.includes(viewingAnswerId)) state.saved = state.saved.filter(id => id !== viewingAnswerId);
  else state.saved.push(viewingAnswerId);
  save();
  openAnswer(viewingAnswerId);
}

// ============ SHARE FOR EVALUATION ============
async function shareForEval() {
  if (!viewingAnswerId) return;
  const a = state.answers.find(x => x.id === viewingAnswerId);
  if (!a) return;

  // Compress images to share-friendly size
  toast("Preparing share link...");
  const compressedImages = [];
  for (const img of (a.images || []).slice(0, 4)) { // limit to 4 photos
    try {
      const small = await compressForShare(img, 900, 0.55);
      compressedImages.push(small);
    } catch (e) { console.warn("compress for share", e); }
  }

  const sharePayload = {
    id: a.id,
    source: a.source,
    paper: a.paper,
    topic: a.topic,
    question: a.question,
    marks: a.marks,
    year: a.year,
    attemptDate: a.attemptDate,
    notes: a.notes,
    images: compressedImages,
    userEmail: "anandsaurav100@gmail.com"
  };

  const json = JSON.stringify(sharePayload);
  const encoded = btoa(encodeURIComponent(json));
  const baseUrl = location.href.replace(/index\.html.*$/, "").replace(/\?.*$/, "").replace(/#.*$/, "");
  const evalUrl = baseUrl + "eval.html#a=" + encoded;

  const sizeKB = Math.round(evalUrl.length / 1024);

  // Build a "to teacher" message
  const teacherMessage =
    "Sir / Ma'am,\n\n" +
    "Please evaluate my answer at the link below. The page has the question, my handwritten attempt, and a form for your feedback.\n\n" +
    evalUrl + "\n\n" +
    "Thank you,\nSaurav";

  // Try Web Share API (native phone share sheet) first
  if (navigator.share) {
    try {
      await navigator.share({
        title: "Abhyas · Please evaluate my answer",
        text: teacherMessage
      });
      toast("✓ Shared (" + sizeKB + " KB link)");
      return;
    } catch (e) {
      if (e.name !== "AbortError") console.warn("share api", e);
    }
  }

  // Fallback: copy to clipboard
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(teacherMessage);
    alert(`✓ Link copied to clipboard (${sizeKB} KB).\n\nPaste in WhatsApp / email to send to your teacher.\n\nThe message includes:\n- A short note\n- The link to view your answer + fill evaluation form`);
  } else {
    // Final fallback
    prompt("Copy this link and send to your teacher:", evalUrl);
  }
}

function compressForShare(dataUrl, maxW = 900, q = 0.55) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", q));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// ============ SAVED / RECENT ============
function renderSaved() {
  const el = document.getElementById("savedList");
  const list = state.saved.map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  el.innerHTML = list.length ? list.map(answerRow).join("") : `<div class="empty"><div class="em-title">Nothing saved yet</div></div>`;
}
function renderRecent() {
  const el = document.getElementById("recentFullList");
  const list = state.recent.map(id => state.answers.find(a => a.id === id)).filter(Boolean);
  el.innerHTML = list.length ? list.map(answerRow).join("") : `<div class="empty"><div class="em-title">No recent</div></div>`;
}

// ============ INSIGHTS ============
function renderInsights() {
  const el = document.getElementById("insightsContent");
  const evaluated = state.answers.filter(a => a.evaluation);
  if (evaluated.length === 0) {
    el.innerHTML = `<div class="empty"><div class="em-title">No evaluations yet</div><div>Add evaluations to your attempts to see patterns here.</div></div>`;
    return;
  }
  // Tally strengths and weaknesses
  const strengths = {}, weaknesses = {};
  evaluated.forEach(a => {
    (a.evaluation.strengths||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(s => strengths[s.toLowerCase()] = (strengths[s.toLowerCase()]||0) + 1);
    (a.evaluation.weaknesses||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(s => weaknesses[s.toLowerCase()] = (weaknesses[s.toLowerCase()]||0) + 1);
  });
  const sortedS = Object.entries(strengths).sort((a,b) => b[1] - a[1]).slice(0, 20);
  const sortedW = Object.entries(weaknesses).sort((a,b) => b[1] - a[1]).slice(0, 20);
  el.innerHTML = `
    <div class="eval-section-title">💚 Your strengths (top patterns)</div>
    <div class="eval-card">
      <div class="eval-tags">${sortedS.length ? sortedS.map(([k,v])=>`<span class="eval-tag strength">${escapeHtml(k)} · ${v}</span>`).join("") : '<span style="color:var(--muted)">No strength tags yet</span>'}</div>
    </div>
    <div class="eval-section-title">🩹 Patterns to work on</div>
    <div class="eval-card" style="border-left-color: var(--bad)">
      <div class="eval-tags">${sortedW.length ? sortedW.map(([k,v])=>`<span class="eval-tag weakness">${escapeHtml(k)} · ${v}</span>`).join("") : '<span style="color:var(--muted)">No weakness tags yet</span>'}</div>
    </div>
    <div class="eval-section-title">📊 Numbers</div>
    <div class="meta-stats">
      <div class="ts"><div class="v">${state.answers.length}</div><div class="l">Attempts</div></div>
      <div class="ts"><div class="v">${evaluated.length}</div><div class="l">Evaluated</div></div>
      <div class="ts"><div class="v">${Math.round(100*evaluated.length/state.answers.length)||0}%</div><div class="l">Cov.</div></div>
    </div>`;
}

// ============ ADD ANSWER ============
function openAddAnswer() {
  document.getElementById("addDate").value = new Date().toISOString().slice(0,10);
  const paperSel = document.getElementById("addPaper");
  paperSel.innerHTML = PAPERS.map(p => `<option value="${p.key}">${p.name}</option>`).join("");
  paperSel.onchange = updateTopicSelect;
  updateTopicSelect();
  if (viewingFromPaper) { paperSel.value = viewingFromPaper; updateTopicSelect(); }
  answerPhotos = [];
  renderPhotoThumbs("answer");
  document.getElementById("addModal").classList.add("open");
}
function updateTopicSelect() {
  const paperKey = document.getElementById("addPaper").value;
  const paper = PAPERS.find(p => p.key === paperKey);
  const topicSel = document.getElementById("addTopic");
  topicSel.innerHTML = paper.topics.map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join("");
  if (activeTopic && paper.topics.includes(activeTopic)) topicSel.value = activeTopic;
}
function closeAddAnswer() { document.getElementById("addModal").classList.remove("open"); }
function saveAddAnswer() {
  const id = "a-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);
  const a = {
    id,
    source: document.getElementById("addSource").value,
    paper: document.getElementById("addPaper").value,
    topic: document.getElementById("addTopic").value,
    question: document.getElementById("addQuestion").value.trim(),
    marks: document.getElementById("addMarks").value.trim(),
    year: document.getElementById("addYear").value.trim(),
    attemptDate: document.getElementById("addDate").value,
    selfScore: document.getElementById("addSelfScore").value.trim(),
    timeMin: document.getElementById("addTime").value.trim(),
    images: [...answerPhotos],
    notes: document.getElementById("addNotes").value.trim(),
    evaluation: null,
    createdAt: Date.now()
  };
  if (!a.question) { alert("Question text is required."); return; }
  state.answers.unshift(a);
  save();
  ["addQuestion","addMarks","addYear","addSelfScore","addTime","addNotes"].forEach(fid => document.getElementById(fid).value = "");
  answerPhotos = []; renderPhotoThumbs("answer");
  closeAddAnswer();
  toast("✓ Attempt saved");
  if (currentView === "home") renderHome();
  else if (currentView === "paper" && viewingFromPaper) openPaper(viewingFromPaper);
}

// ============ ADD EVALUATION ============
function openAddEval() {
  if (!viewingAnswerId) return;
  document.getElementById("evalDate").value = new Date().toISOString().slice(0,10);
  const a = state.answers.find(x => x.id === viewingAnswerId);
  if (a?.evaluation) {
    // Pre-fill for edit
    document.getElementById("evalBy").value = a.evaluation.by||"";
    document.getElementById("evalScore").value = a.evaluation.score||"";
    document.getElementById("evalComments").value = a.evaluation.comments||"";
    document.getElementById("evalStrengths").value = a.evaluation.strengths||"";
    document.getElementById("evalWeaknesses").value = a.evaluation.weaknesses||"";
    evalPhotos = [...(a.evaluation.images||[])];
  } else {
    document.getElementById("evalBy").value = "Self";
    ["evalScore","evalComments","evalStrengths","evalWeaknesses"].forEach(fid => document.getElementById(fid).value = "");
    evalPhotos = [];
  }
  renderPhotoThumbs("eval");
  document.getElementById("evalModal").classList.add("open");
}
function closeAddEval() { document.getElementById("evalModal").classList.remove("open"); }
function saveAddEval() {
  if (!viewingAnswerId) return;
  const a = state.answers.find(x => x.id === viewingAnswerId);
  if (!a) return;
  a.evaluation = {
    by: document.getElementById("evalBy").value.trim() || "Self",
    date: document.getElementById("evalDate").value,
    score: document.getElementById("evalScore").value.trim(),
    comments: document.getElementById("evalComments").value.trim(),
    strengths: document.getElementById("evalStrengths").value.trim(),
    weaknesses: document.getElementById("evalWeaknesses").value.trim(),
    images: [...evalPhotos]
  };
  save();
  closeAddEval();
  toast("✓ Evaluation saved");
  openAnswer(viewingAnswerId);
}

// ============ PHOTOS ============
async function handlePhotoUpload(event, target) {
  const files = Array.from(event.target.files || []);
  const arr = target === "answer" ? answerPhotos : evalPhotos;
  for (const file of files) {
    if (!file.type.startsWith("image/")) continue;
    try {
      const dataUrl = await readCompressed(file);
      arr.push(dataUrl);
    } catch (e) { console.warn("photo", e); }
  }
  renderPhotoThumbs(target);
  event.target.value = "";
}
function readCompressed(file, maxW = 1400, q = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", q));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function renderPhotoThumbs(target) {
  const arr = target === "answer" ? answerPhotos : evalPhotos;
  const el = document.getElementById(target === "answer" ? "answerPhotoThumbs" : "evalPhotoThumbs");
  el.innerHTML = arr.map((url, i) =>
    `<div class="photo-thumb" style="background-image: url('${url}')"><span class="remove" onclick="removePhoto('${target}', ${i})">×</span></div>`
  ).join("");
}
function removePhoto(target, idx) {
  const arr = target === "answer" ? answerPhotos : evalPhotos;
  arr.splice(idx, 1);
  renderPhotoThumbs(target);
}

// ============ SEARCH ============
function onSearch() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const recentEl = document.getElementById("recentList");
  if (!q) { renderHome(); return; }
  const matches = state.answers.filter(a => [a.question, a.topic, a.year, a.notes, a.evaluation?.comments, a.evaluation?.strengths, a.evaluation?.weaknesses].filter(Boolean).some(v => v.toLowerCase().includes(q)));
  document.getElementById("recentLabel").innerHTML = `<span>Search: ${matches.length} matches</span>`;
  recentEl.innerHTML = matches.length ? matches.slice(0,15).map(answerRow).join("") : `<div class="empty"><div class="em-title">No matches</div></div>`;
}

// ============ LIGHTBOX ============
function openLightbox(url) { document.getElementById("lightboxImg").src = url; document.getElementById("lightbox").classList.add("open"); }
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); document.getElementById("lightboxImg").src = ""; }

// ============ HELPERS ============
function escapeHtml(s) { return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}

renderHome();
